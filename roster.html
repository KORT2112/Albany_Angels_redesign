<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albany Angels - Weekly Roster</title>
  <meta name="description" content="Albany Angels weekly roster. See who's available today with live availability for full service and sensual massage." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    .roster-card-body {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 7px;
    }

    .roster-card-body h3 {
      margin: 0;
    }

    .roster-card-body .availability-time {
      margin: 0 0 0 -5px;
      padding: 4px 8px;
      line-height: 1;
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      background: rgba(201, 164, 92, 0.1);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Roster page top padding for fixed header */
    .roster-main-section {
      /* Desktop: small top padding inside the section */
      padding-top: 24px;
      padding-bottom: 48px;
    }

    @media (max-width: 820px) {
      /* Mobile: section starts right below the fixed header (64px) */
      .roster-main-section {
        padding-top: 76px !important;
        padding-bottom: 24px !important;
      }

      /* Dashboard card — tighter padding, no border-radius clip */
      .roster-dashboard {
        padding: 14px 12px 18px !important;
        border-radius: 14px !important;
        /* Prevent any overflow clipping of day pills */
        overflow: visible !important;
      }

      /* Topbar — stack vertically */
      .roster-topbar {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 10px !important;
        margin-bottom: 12px !important;
      }

      .roster-topbar .eyebrow {
        margin-bottom: 2px !important;
      }

      .roster-topbar h2 {
        font-size: clamp(1.5rem, 6vw, 1.9rem) !important;
        margin-bottom: 0 !important;
      }

      /* Date line */
      .roster-date {
        font-size: 0.85rem !important;
        margin-top: 2px !important;
      }

      .roster-actions {
        width: 100% !important;
      }

      /* Segmented toggle — full width, no overflow */
      .mode-toggle-wrap.segmented-toggle {
        min-width: 0 !important;
        width: 100% !important;
        display: flex !important;
      }

      .segmented-option {
        flex: 1 !important;
        min-height: 44px !important;
        padding: 0 10px !important;
        font-size: 0.85rem !important;
        text-align: center !important;
        white-space: nowrap !important;
      }

      /* Day selector — 7 pills in 4+3 layout */
      .day-selector {
        display: grid !important;
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
        gap: 7px !important;
        margin-bottom: 14px !important;
        /* Ensure pills are never clipped */
        overflow: visible !important;
      }

      /* Day pill — clean, centered, no clipping */
      .day-pill {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 8px 4px 7px !important;
        font-size: 0.82rem !important;
        font-weight: 600 !important;
        border-radius: 10px !important;
        text-align: center !important;
        min-height: 48px !important;
        /* Ensure active state is fully visible */
        box-sizing: border-box !important;
      }

      .day-pill span {
        display: block !important;
        font-size: 0.66rem !important;
        margin-top: 2px !important;
        color: var(--text-muted) !important;
      }

      /* Active pill — ensure gold border is fully rendered */
      .day-pill.active {
        border-color: var(--accent) !important;
        background: rgba(201, 164, 92, 0.14) !important;
        box-shadow: 0 0 0 1px rgba(201, 164, 92, 0.2) !important;
      }

      /* Availability grid — 2 columns */
      .availability-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 10px !important;
      }

      .availability-card .real-card-image {
        max-height: 200px !important;
      }

      .availability-card .profile-body {
        padding: 10px 10px 12px !important;
      }

      .availability-card h3 {
        font-size: 1.1rem !important;
      }

      .roster-card-body .availability-time {
        font-size: 0.68rem !important;
      }
    }

    @media (max-width: 390px) {
      /* On very small screens, 4-col day pills may get too narrow — switch to 4-col with smaller text */
      .day-pill {
        font-size: 0.76rem !important;
        padding: 7px 2px 6px !important;
      }
      .day-pill span {
        font-size: 0.62rem !important;
      }
    }

    @media (max-width: 360px) {
      .availability-grid {
        grid-template-columns: 1fr !important;
      }

      /* At 360px, 4-col is too tight — use 4-col but even smaller */
      .day-selector {
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
        gap: 5px !important;
      }

      .day-pill {
        font-size: 0.72rem !important;
        padding: 6px 2px 5px !important;
        min-height: 44px !important;
      }

      .segmented-option {
        font-size: 0.78rem !important;
        padding: 0 6px !important;
      }
    }
  </style>

    const profileMap = {

      MEGAN: 'megan.html',
      MEL: 'mel.html',

      MILA: 'mila.html',

      PEACHES: 'peaches.html',
      SERENA: 'serena.html',
      SHANAYA: 'shanaya.html',
      TAYLOR: 'taylor.html',

        ]

    const grid = document.getElementById('availabilityGrid');
    const title = document.getElementById('selectedDayTitle');
    const date = document.getElementById('selectedDate');
    const modeSwitchWrap = document.getElementById('modeSwitchWrap');
    const fullServiceLabel = document.getElementById('fullServiceLabel');
    const sensualLabel = document.getElementById('sensualLabel');
    const buttons = [...document.querySelectorAll('.day-pill')];
    let currentMode = 'full';

    function formatTimeRange(raw) {
      const [startRaw, endRaw] = raw.split('-').map(s => s.trim());

      function parsePart(part) {
        const normalized = part.replace(/\s+/g, '').toLowerCase();
        let hours = 0;
        let minutes = 0;

        if (normalized.includes('.')) {
          const [h, m] = normalized.split('.');
          hours = parseInt(h, 10);
          minutes = parseInt((m || '0').padEnd(2, '0').slice(0, 2), 10);
        } else {
          hours = parseInt(normalized, 10);
        }
        return { hours, minutes };
      }

      function render(hours24, minutes) {
        const d = new Date(2000, 0, 1, hours24, minutes);
        return d.toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit', hour12: true }).replace('am', 'AM').replace('pm', 'PM');
      }

      const start = parsePart(startRaw);
      const end = parsePart(endRaw);

      let start24;
      if (start.hours === 12) {
        start24 = 12;
      } else if (start.hours >= 10 && start.hours <= 11) {
        start24 = start.hours;
      } else if (start.hours >= 1 && start.hours <= 9) {
        start24 = start.hours + 12;
      } else {
        start24 = start.hours;
      }

      let end24;
      if (end.hours === 12) {
        end24 = 12;
      } else if (end.hours >= 1 && end.hours <= 11) {
        end24 = end.hours + 12;
      } else {
        end24 = end.hours;
      }

      if (start24 >= 12 && end24 <= start24) {
        end24 = end.hours === 12 ? 12 : end.hours + 12;
      }
      if (start24 < 12 && end24 < 12 && end.hours !== 12) {
        end24 = end.hours + 12;
      }

      return `${render(start24, start.minutes)} - ${render(end24, end.minutes)}`;
    }

    function renderDay(dayKey) {
      const day = roster[dayKey];
      const list = currentMode === 'sensual'
        ? day.girls.filter(([name]) => sensualOnly.has(name))
        : day.girls.filter(([name]) => name !== 'ALEXA');
      title.textContent = day.label;
      date.textContent = day.date;
      grid.innerHTML = list.length === 0
        ? '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px 0;">No girls available for this service on ' + day.label + '. Try another day or switch modes.</p>'
        : list.map(([name, time]) => {
        const img = imageMap[name] || './assets/roster/shadow.jpg';
        const prettyTime = formatTimeRange(time);
        const profileHref = `./girls/${profileMap[name] || 'alexa.html'}`;
        return `
          <article class="profile-card availability-card">
            <a class="profile-card-link" href="${profileHref}" aria-label="View ${name} profile">
              <img class="real-card-image" src="${img}" alt="${name}" />
            </a>
            <div class="profile-body roster-card-body">
              <h3><a class="profile-name-link" href="${profileHref}">${name.charAt(0) + name.slice(1).toLowerCase()}</a>${['ANNIE','BIBI','MELENA','LOLA'].includes(name) ? '<span class="new-pill">New</span>' : name === 'ARIES' ? '<span class="new-pill">She\'s Back!</span>' : ''}</h3>
              <span class="availability-time">${prettyTime}</span>
            </div>
          </article>`;
      }).join('');
      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.day === dayKey));
      fullServiceLabel.classList.toggle('active', currentMode === 'full');
      sensualLabel.classList.toggle('active', currentMode === 'sensual');
      modeSwitchWrap.setAttribute('data-mode', currentMode);
    }

    // Determine current day first so event handlers can reference it
    const now = new Date();
    const weekdayMap = {
      0: 'sunday',
      1: 'monday',
      2: 'tuesday',
      3: 'wednesday',
      4: 'thursday',
      5: 'friday',
      6: 'saturday'
    };
    let activeDayKey = weekdayMap[now.getDay()] || 'monday';

    // Day pill click — update activeDayKey and re-render
    buttons.forEach(btn => btn.addEventListener('click', () => {
      activeDayKey = btn.dataset.day;
      renderDay(activeDayKey);
    }));

    // Mode switch — re-render current day in new mode
    fullServiceLabel.addEventListener('click', () => {
      currentMode = 'full';
      renderDay(activeDayKey);
    });
    sensualLabel.addEventListener('click', () => {
      currentMode = 'sensual';
      renderDay(activeDayKey);
    });

    renderDay(activeDayKey);

    // Mobile menu
    const toggle = document.getElementById('menuToggle');
    const nav = document.getElementById('mainNav');
    toggle.addEventListener('click', () => {
      const isOpen = nav.classList.toggle('open');
      toggle.classList.toggle('active', isOpen);
      document.body.classList.toggle('nav-open', isOpen);
    });
    nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      toggle.classList.remove('active');
      nav.classList.remove('open');
      document.body.classList.remove('nav-open');
    }));

    // Back to top
    const btt = document.getElementById('backToTop');
    window.addEventListener('scroll', () => btt.classList.toggle('visible', window.scrollY > 400));
    btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
